<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Create Account | EasyCart</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="navbar">

        <a href="index.html" class="brand">
            EasyCart
        </a>

        <a href="login.html" class="primary-btn">
            Login
        </a>

    </nav>


    <main class="auth-page">

        <section class="auth-card">

            <div class="auth-logo">
                🛒
            </div>

            <h1>Create Account</h1>

            <p>
                Create your EasyCart account and start shopping.
            </p>


            <form id="signup-form">

                <label for="signup-name">
                    Full Name
                </label>

                <input
                    type="text"
                    id="signup-name"
                    placeholder="Enter your full name"
                    required
                >


                <label for="signup-mobile">
                    Mobile Number
                </label>

                <input
                    type="tel"
                    id="signup-mobile"
                    placeholder="Enter 10-digit mobile number"
                    maxlength="10"
                    required
                >


                <label for="signup-email">
                    Email Address
                </label>

                <input
                    type="email"
                    id="signup-email"
                    placeholder="Enter your email"
                    required
                >


                <label for="signup-password">
                    Password
                </label>

                <input
                    type="password"
                    id="signup-password"
                    placeholder="Create a password"
                    minlength="6"
                    required
                >


                <label for="confirm-password">
                    Confirm Password
                </label>

                <input
                    type="password"
                    id="confirm-password"
                    placeholder="Enter password again"
                    minlength="6"
                    required
                >


                <p
                    id="signup-message"
                    class="form-message">
                </p>


                <button
                    type="submit"
                    class="full-button">

                    Create Account

                </button>

            </form>


            <p class="auth-bottom">

                Already have an account?

                <a href="login.html">
                    Login
                </a>

            </p>

        </section>

    </main>


    <script src="script.js"></script>

</body>

</html>
