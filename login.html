<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | EasyCart</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="navbar">

        <a href="index.html" class="brand">
            EasyCart
        </a>

        <a href="index.html" class="primary-btn">
            Back to Home
        </a>

    </nav>


    <main class="auth-page">

        <section class="auth-card">

            <div class="auth-logo">
                🛒
            </div>

            <h1>Welcome Back</h1>

            <p>
                Login to continue shopping with EasyCart.
            </p>


            <form id="login-form">

                <label for="login-email">
                    Email Address
                </label>

                <input
                    type="email"
                    id="login-email"
                    placeholder="Enter your email"
                    required
                >


                <label for="login-password">
                    Password
                </label>

                <input
                    type="password"
                    id="login-password"
                    placeholder="Enter your password"
                    required
                >


                <div class="form-options">

                    <label class="remember-label">

                        <input type="checkbox">

                        Remember Me

                    </label>

                    <a href="#">
                        Forgot Password?
                    </a>

                </div>


                <p
                    id="login-message"
                    class="form-message">
                </p>


                <button
                    type="submit"
                    class="full-button">

                    Login

                </button>

            </form>


            <p class="auth-bottom">

                Don't have an account?

                <a href="signup.html">
                    Create Account
                </a>

            </p>

        </section>

    </main>


    <script src="script.js"></script>

</body>

</html>
