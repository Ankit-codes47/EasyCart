<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Products | EasyCart</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>


    <!-- NAVBAR -->
    <nav class="navbar">

        <a href="index.html"
           class="brand">
            EasyCart
        </a>

        <button class="menu-toggle"
                type="button"
                onclick="toggleMenu()">
            ☰
        </button>


        <div class="nav-links">

            <a href="index.html">
                Home
            </a>

            <a href="products.html">
                Products
            </a>

            <a href="about.html">
                About
            </a>

            <a href="contact.html">
                Contact
            </a>

            <a href="tracking.html">
                Track Order
            </a>

            <a href="reviews.html">
                Reviews
            </a>

            <a href="faq.html">
                FAQ
            </a>

            <a href="my-orders.html">
                My Orders
            </a>

            <a href="address.html">
                Address
            </a>

            <a href="cart.html"
               class="cart-nav">

                🛒 Cart

                <span class="cart-count">
                    0
                </span>

            </a>

            <a href="login.html">
                Login
            </a>

            <a href="signup.html"
               class="signup-btn">
                Sign Up
            </a>

        </div>

    </nav>


    <!-- PAGE HEADER -->
    <section class="page-header">

        <h1>
            Shop Groceries
        </h1>

        <p>
            Browse 40 everyday grocery,
            food and household products.
        </p>

    </section>


    <main>


        <!-- SEARCH AND FILTER -->
        <section class="product-search">

            <input type="search"
                   id="product-search"
                   placeholder="Search for products...">


            <select id="category-filter">

                <option value="All">
                    All Categories
                </option>

                <option value="Fruits">
                    Fruits
                </option>

                <option value="Vegetables">
                    Vegetables
                </option>

                <option value="Dairy">
                    Dairy
                </option>

                <option value="Bakery">
                    Bakery
                </option>

                <option value="Snacks">
                    Snacks
                </option>

                <option value="Beverages">
                    Beverages
                </option>

                <option value="Staples">
                    Staples
                </option>

                <option value="Dry Fruits">
                    Dry Fruits
                </option>

                <option value="Household">
                    Household
                </option>

            </select>

        </section>


        <!-- PRODUCTS -->
        <section class="products-section">

            <div id="products-grid"
                 class="products-grid">

                <!-- Products are added by JavaScript -->

            </div>

        </section>

    </main>


    <!-- FOOTER -->
    <footer>

        <div class="copyright">

            <p>
                &copy; 2026 EasyCart.
                All Rights Reserved.
            </p>

            <p>
                Fresh Products • Fast Delivery
            </p>

        </div>

    </footer>


    <!-- JAVASCRIPT -->
    <script src="script.js"></script>

</body>

</html>
